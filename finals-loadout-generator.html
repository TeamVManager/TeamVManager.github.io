<title>The Finals — Loadout Generator</title>

<style>
* { box-sizing: border-box; }
body { background: #000; margin: 0; color: #fff; font-family: 'Saira', sans-serif; }
#nav { width: 100%; padding: 24px 0 8px; text-align: center; }
#nav a { display: inline-block; padding: 6px 20px; border: 0.2em solid #fff; border-radius: 10px; color: #fff; text-decoration: none; font-size: 0.95em; letter-spacing: 0.2em; text-transform: uppercase; transition: 0.2s; }
#nav a:hover { background: #fff; color: #000; }
#content { width: 940px; margin: 20px auto; padding: 8px 0; }
#content h1 { font-size: 2.4em; letter-spacing: 0.25em; text-align: center; margin: 10px auto 3px; }
.sub { font-size: 0.95em; color: #fff; letter-spacing: 0.2em; text-align: center; font-weight: 400; margin: 0 auto 14px; }
.class-row { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; margin: 14px 0; }
.class-btn { padding: 6px 20px; border: 0.2em solid #fff; border-radius: 10px; background: transparent; color: #fff; font-family: 'Saira', sans-serif; font-size: 1em; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: 0.2s; position: relative; }
.class-btn:hover { background: #fff; color: #000; }
.class-btn.on { background: #fff; color: #000; box-shadow: 0 0 12px rgba(255,255,255,0.25); animation: pop 0.25s ease; }
@keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
.gen-btn { padding: 10px 30px; border: 0.2em solid #fff; border-radius: 10px; background: transparent; color: #fff; font-family: 'Saira', sans-serif; font-size: 1.05em; letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
.gen-btn:hover:not(:disabled) { background: #fff; color: #000; }
.gen-btn:disabled { opacity: 0.3; cursor: default; }
.gen-btn.cd { opacity: 0.5; border-color: #f7bb2b; color: #f7bb2b; animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 0.8; } }
.gen-row { text-align: center; margin: 16px 0; }
.disp { display: flex; flex-direction: column; align-items: center; gap: 14px; margin: 12px 0 24px; min-height: 260px; width: 100%; }
.lo { display: grid; grid-template-columns: 195px 1fr; gap: 14px; width: 100%; align-items: start; }
.lo-g { display: flex; gap: 14px; flex-wrap: wrap; }
.spec-desc { font-size: 0.85em; color: #fff; line-height: 1.6; letter-spacing: 0.04em; text-align: left; }
.it { color: #fff; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.08em; }
.in { color: #f7bb2b; font-weight: 600; }
.ix { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; min-height: 20px; }
.ix-b { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.5em; letter-spacing: 0.05em; }
.ix-anti { background: rgba(255,80,50,0.15); color: #ff5032; border: 0.05em solid rgba(255,80,50,0.3); }

.card { width: 195px; border: 0.15em solid #333; border-radius: 10px; overflow: hidden; transition: 0.2s; background: #0a0a0a; min-height: 270px; }
.card:hover { transform: translateY(-5px); }
.img { width: 100%; height: 135px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: linear-gradient(180deg, #9EB1C0, #CCDADE); box-shadow: inset 0 0 20px rgba(0,0,0,0.12); }
.img img { width: 100%; height: 100%; object-fit: contain; padding: 8px; filter: drop-shadow(0 0 4px rgba(0,0,0,0.1)); }
.img .f { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2.5em; color: #fff; }
.ft { padding: 8px 10px; text-align: center; min-height: 42px; display: flex; flex-direction: column; justify-content: center; border-top: 0.1em solid #222; }
.ft .t { font-size: 0.55em; letter-spacing: 0.15em; color: #fff; text-transform: uppercase; }
.ft .n { font-size: 0.82em; font-weight: 600; color: #fff; margin-top: 2px; line-height: 1.2; }
.card.spin .img .f, .card.spin .ft .n { color: #f7bb2b; }
.card.spin { border-color: #f7bb2b !important; box-shadow: 0 0 12px rgba(247,187,43,0.3); }
.card.done { border-color: #fff !important; }
.s-card { border-color: #f7bb2b; }
.w-card { border-color: #4a9eff; }
.g-card { border-color: #4ae6a0; }
.ph .img .f { color: #fff; font-size: 1.6em; }
.ph .ft .n { color: #fff; }
.ph { border-color: #222 !important; border-style: dashed; }
.ph:hover { border-color: #444 !important; transform: none; }
.hint { text-align: center; color: #fff; padding: 30px 20px; }
.hint .i { font-size: 2.4em; margin-bottom: 6px; }

/* ── Stat bars ─────────────────────────────────────────────────── */
.st { padding: 6px 10px; border-top: 0.05em solid #222; transition: opacity 0.35s ease; }
.card.spin .st { opacity: 0; }
.sr { display: flex; align-items: center; gap: 4px; margin: 2px 0; font-size: 0.55em; letter-spacing: 0.04em; }
.sl { min-width: 26px; color: #888; text-transform: uppercase; }
.sv { min-width: 18px; text-align: right; color: #fff; font-weight: 600; }
.strack { flex: 1; height: 6px; background: #1a1a1a; border-radius: 3px; overflow: hidden; }
.sfill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.su { color: #666; font-size:0.85em; margin-left:1px; }

/* ── Headshot badge ───────────────────────────────────────────── */
.hsb { background: linear-gradient(90deg,transparent,rgba(247,187,43,0.12),transparent); text-align:center; padding:3px 0; font-size:0.55em; letter-spacing:0.12em; color:#f7bb2b; border-bottom:0.05em solid rgba(247,187,43,0.2); }
.hsb-icon { font-size:1.15em; margin-right:2px; }

/* ── Gadget type badge ─────────────────────────────────────────── */
.gt { font-size: 0.5em; letter-spacing: 0.1em; text-transform: uppercase; text-align: center; padding: 3px 0 2px; border-top: 0.05em solid #222; }
.gt .b { display: inline-block; padding: 0 7px; border-radius: 3px; }
.gt .explosive { background: rgba(255,80,50,0.2); color: #ff5032; }
.gt .utility { background: rgba(80,160,255,0.2); color: #50a0ff; }
.gt .support { background: rgba(0,212,212,0.2); color: #00d4d4; }
.gt .defensive { background: rgba(200,130,255,0.2); color: #c882ff; }
.gt .fire { background: rgba(255,140,0,0.2); color: #ff8c00; }
.gt .gas { background: rgba(50,220,100,0.2); color: #32dc64; }

/* ── Slot overlay ───────────────────────────────────────────── */
#slot-overlay { position:fixed; inset:0; z-index:1000; display:flex; align-items:center; justify-content:center; }
#slot-overlay.hide { display:none; }
.so-backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.8); }
.so-panel { position:relative; background:#0a0a0a; border:0.15em solid #fff; border-radius:10px; padding:18px; max-width:520px; width:90%; max-height:80vh; overflow-y:auto; }
.so-header { font-size:0.7em; letter-spacing:0.2em; color:#f7bb2b; text-transform:uppercase; text-align:center; margin-bottom:8px; }
.so-random { display:block; margin:0 auto 10px; padding:4px 16px; border:0.15em solid #fff; border-radius:10px; background:transparent; color:#fff; font-family:'Saira',sans-serif; font-size:0.65em; letter-spacing:0.1em; cursor:pointer; transition:0.15s; }
.so-random:hover { background:#fff; color:#000; }
.so-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; }
.so-item { display:flex; flex-direction:column; align-items:center; gap:2px; padding:5px 3px; border:0.1em solid #333; border-radius:8px; background:transparent; color:#fff; font-family:'Saira',sans-serif; font-size:0.6em; cursor:pointer; transition:0.15s; line-height:1.2; }
.so-item:hover { border-color:#fff; color:#fff; }
.so-item.locked { border-color:#f7bb2b; color:#f7bb2b; background:rgba(247,187,43,0.08); }
.card.lk { border-color:#f7bb2b !important; }

.sd-div { border: 0; border-top: 0.05em solid #333; margin: 8px 0; }
.sd-hdr { font-size: 0.65em; color: #f7bb2b; letter-spacing: 0.1em; margin: 4px 0 3px; text-transform: uppercase; }
.sd-ln { font-size: 0.72em; color: #fff; margin: 1px 0; line-height: 1.5; }

hr { border: 0; border-top: 0.08em solid #222; margin: 20px 0; }
#ftr { text-align: center; color: #fff; font-size: 0.78em; padding: 12px 0 24px; letter-spacing: 0.1em; }

function ra(a){return a[Math.floor(Math.random()*a.length)];}
function rn(n,a){let p=[...a],r=[];while(r.length<n&&p.length){let i=Math.floor(Math.random()*p.length);r.push(p.splice(i,1)[0]);}return r;}

// ── Locked state & synergy logic ──────────────────────────────────────
let locked = { spec:null, wep:null, gad0:null, gad1:null, gad2:null };
let symap = {};
SY.forEach(p=>{
  if(!symap[p.a]) symap[p.a]=new Set();
  if(!symap[p.b]) symap[p.b]=new Set();
  symap[p.a].add(p.b);
  symap[p.b].add(p.a);
});

function pickSynergy(pool, lockedVals){
  if(!pool.length) return null;
  let scores = pool.map(item => {
    let score = 0;
    lockedVals.forEach(lv => {
      if(symap[item] && symap[item].has(lv)) score++;
    });
    return { item, score };
  });
  let max = Math.max(...scores.map(s=>s.score));
  if(max===0) return null;
  let candidates = scores.filter(s=>s.score===max).map(s=>s.item);
  return ra(candidates);
}

function lockSlot(slot, value){
  if(spinning) return;
  if(locked[slot] === value && value !== null) { value = null; }
  locked[slot] = value;
  let cards = document.querySelectorAll('#disp .card');
  let keys = ['spec','wep','gad0','gad1','gad2'];
  let idx = keys.indexOf(slot);
  if(cards[idx]) cards[idx].classList.toggle('lk', value !== null);
}

function openSlotOverlay(slotKey){
  if(spinning||!cc) return;
  let c = DATA[cc];
  let slotLabels = { spec:'SPECIALIZATION', wep:'WEAPON', gad0:'GADGET 1', gad1:'GADGET 2', gad2:'GADGET 3' };
  let pools = {
    spec: c.spec.map(x=>x.n),
    wep: c.wep,
    gad0: [...c.gad, ...DATA.shared.gad],
    gad1: [...c.gad, ...DATA.shared.gad],
    gad2: [...c.gad, ...DATA.shared.gad]
  };
  let items = pools[slotKey] || [];
  let h = '<div class="so-backdrop"></div><div class="so-panel"><div class="so-header">'+(slotLabels[slotKey]||'')+'</div>';
  h += '<button class="so-random" data-slot="'+slotKey+'" data-item="">Random</button><div class="so-grid">';
  items.forEach(item => {
    h += '<button class="so-item'+(locked[slotKey]===item?' locked':'')+'" data-slot="'+slotKey+'" data-item="'+item.replace(/"/g,'&quot;')+'">';
    h += imgTag(item)+'<span>'+item+'</span></button>';
  });
  h += '</div></div>';
  let overlay = document.getElementById('slot-overlay');
  overlay.innerHTML = h;
  overlay.classList.remove('hide');
}

function closeSlotOverlay(){
  document.getElementById('slot-overlay').classList.add('hide');
}

document.querySelectorAll('.class-btn').forEach(b=>{
  b.onclick=()=>{
    if(spinning) return;
    cc=b.dataset.c;
    if(cdTimer){clearInterval(cdTimer);cdTimer=null;}
    document.querySelectorAll('.class-btn').forEach(x=>x.classList.toggle('on',x.dataset.c===cc));
    showPH();
    Object.keys(locked).forEach(k=>{ locked[k]=null; });
    closeSlotOverlay();
    let btn=document.getElementById('gb');
    btn.disabled=false; btn.classList.remove('cd'); btn.textContent='GENERATE';
  };
});

document.getElementById('disp').addEventListener('click', function(e){
  let card = e.target.closest('.card');
  if(!card||spinning) return;
  let cards = this.querySelectorAll('.card');
  let idx = Array.from(cards).indexOf(card);
  if(idx===-1) return;
  openSlotOverlay(['spec','wep','gad0','gad1','gad2'][idx]);
});

document.getElementById('slot-overlay').addEventListener('click', function(e){
  if(e.target===this||e.target.classList.contains('so-backdrop')){ closeSlotOverlay(); return; }
  let btn = e.target.closest('[data-slot]');
  if(!btn) return;
  let slot = btn.dataset.slot;
  let item = btn.dataset.item;
  lockSlot(slot, item||null);
  closeSlotOverlay();
});

document.addEventListener('keydown', function(e){
  if(e.key==='Escape') closeSlotOverlay();
});

function cd(btn){
  btn.disabled=true; btn.classList.add('cd'); btn.textContent='5';
  let n=4;
  cdTimer=setInterval(()=>{
    btn.textContent=''+n; n--;
    if(n<0){clearInterval(cdTimer);cdTimer=null;btn.disabled=false;btn.classList.remove('cd');btn.textContent='GENERATE';}
  },1000);
}

  let hsb=el.querySelector('.hsb');
  if (!isGadget) {
    let w=WS[name];
    if (w&&w.hs>0) {
      let h='<div class="hsb"><span class="hsb-icon">&#9760;</span> '+Math.round(w.hs*100)+'%</div>';
      if (hsb) hsb.outerHTML=h;
      else el.insertAdjacentHTML('afterbegin',h);
    } else if (hsb) hsb.remove();
  } else if (hsb) hsb.remove();

  if (gt) gt.outerHTML=gtypeHTML(name);
  else if (isGadget) el.querySelector('.ft').insertAdjacentHTML('afterend',gtypeHTML(name));

  if (st) st.outerHTML=statRows(name,isGadget);

function startSpin(c, lk){
  let specNames=c.spec.map(x=>x.n);
  let wepNames=c.wep;
  let gadPool=[...c.gad,...DATA.shared.gad];

  let specFinal = lk.spec || ra(specNames);
  let wepFinal  = lk.wep  || ra(wepNames);

  let gadKeys = ['gad0','gad1','gad2'];
  let gadgets = [null, null, null];
  let used = [];
  gadKeys.forEach((key,i)=>{
    if(lk[key]){ gadgets[i]=lk[key]; used.push(lk[key]); }
  });
  gadKeys.forEach((key,i)=>{
    if(gadgets[i]===null){
      let pool = gadPool.filter(g=>!used.includes(g));
      if(!pool.length) pool = gadPool;
      let pick = ra(pool);
      gadgets[i]=pick;
      used.push(pick);
    }
  });

  let disp=document.getElementById('disp');
  disp.innerHTML='<div class="lo">'+cardHTML('SPECIALIZATION',specFinal,'s-card')+'<div class="spec-desc"></div>'+cardHTML('WEAPON',wepFinal,'w-card')+'<div class="lo-g">'+cardHTML('GADGET',gadgets[0],'g-card',true)+cardHTML('GADGET',gadgets[1],'g-card',true)+cardHTML('GADGET',gadgets[2],'g-card',true)+'</div></div><div class="ix" id="ix"></div>';

  let slots=disp.querySelectorAll('.card');
  slots.forEach(el=>el.classList.add('spin'));

  let allLocked = Object.values(lk).every(v=>v!==null);
  let defs=[
    {el:slots[0], pool:allLocked?[specFinal]:specNames, final:specFinal, iv:null, g:false},
    {el:slots[1], pool:allLocked?[wepFinal]:wepNames, final:wepFinal, iv:null, g:false},
    {el:slots[2], pool:allLocked?[gadgets[0]]:gadPool, final:gadgets[0], iv:null, g:true},
    {el:slots[3], pool:allLocked?[gadgets[1]]:gadPool, final:gadgets[1], iv:null, g:true},
    {el:slots[4], pool:allLocked?[gadgets[2]]:gadPool, final:gadgets[2], iv:null, g:true}
  ];

  defs.forEach(d=>{
    if(d.pool.length<=1) return;
    d.iv=setInterval(()=>setCard(d.el,ra(d.pool),d.g),55);
  });

  function stop(idx,at){
    setTimeout(()=>{
      let d=defs[idx];
      if(d.iv){clearInterval(d.iv);d.iv=null;}
      setCard(d.el,d.final,d.g);
      d.el.classList.add('done');
    },at);
  }
  if(allLocked){ stop(4,0); stop(3,0); stop(2,0); stop(1,0); stop(0,0); }
  else { stop(4,400); stop(3,550); stop(2,700); stop(1,950); stop(0,1200); }

  let revealDelay = allLocked ? 50 : 1250;
  setTimeout(()=>{
    let allItems=[specFinal,wepFinal,...gadgets];
    let labels=['Specialization','Weapon','Gadget','Gadget','Gadget'];
    let sd=disp.querySelector('.spec-desc');
    if(sd){
      let h='';
      allItems.forEach((n,i)=>{
        h+='<div><span class="it">'+labels[i]+'</span> <span class="in">'+n+'</span> &mdash; '+(DESC[n]||'')+'.</div>';
      });
      let seen=new Set();
      let synLines=[];
      SY.forEach(p=>{
        if(allItems.includes(p.a)&&allItems.includes(p.b)){
          let key=p.a<p.b?p.a+'||'+p.b:p.b+'||'+p.a;
          if(SY_DESC[key]&&!seen.has(key)){
            seen.add(key);
            synLines.push('<div class="sd-ln">&bull; <span class="in">'+p.a+'</span> + <span class="in">'+p.b+'</span> &mdash; '+SY_DESC[key]+'</div>');
          }
        }
      });
      if(synLines.length){
        h+='<hr class="sd-div"><div class="sd-hdr">Synergy</div>'+synLines.join('');
      }
      sd.innerHTML=h;
    }
  },revealDelay);

  setTimeout(()=>{
    slots.forEach(el=>el.classList.remove('spin'));
    let all=[specFinal,wepFinal,...gadgets];
    let r=checkIX(all);
    let ixEl=document.getElementById('ix');
    if(ixEl){
      let h='';
      r.forEach(d=>{h+='<span class="ix-b ix-anti">&#9888; '+d+'</span>';});
      ixEl.innerHTML=h;
    }
  },revealDelay+50);

  setTimeout(()=>{
    defs.forEach(d=>{if(d.iv){clearInterval(d.iv);d.iv=null;}});
    spinning=false;
  },revealDelay+100);
}

function gen(){
  if(!cc||spinning) return;
  spinning=true;
  if(cdTimer){clearInterval(cdTimer);cdTimer=null;}
  let btn=document.getElementById('gb');
  btn.disabled=true; btn.classList.remove('cd'); btn.textContent='GENERATE';
  startSpin(DATA[cc], {...locked});
  cd(btn);
}
document.getElementById('gb').onclick=gen;
</script>
</body>
</html>
