<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TeamV — Team Loadout Generator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
* { box-sizing: border-box; }
body { background: #000; margin: 0; color: #fff; font-family: 'Saira', sans-serif; }
#nav { width: 100%; padding: 24px 0 8px; text-align: center; }
#nav a { display: inline-block; padding: 6px 20px; border: 0.2em solid #fff; border-radius: 10px; color: #fff; text-decoration: none; font-size: 0.95em; letter-spacing: 0.2em; text-transform: uppercase; transition: 0.2s; }
#nav a:hover { background: #fff; color: #000; }
#content { width: 960px; margin: 20px auto; padding: 8px 0; }
#content h1 { font-size: 2em; letter-spacing: 0.25em; text-align: center; margin: 10px auto 3px; }
.sub { font-size: 0.85em; color: #fff; letter-spacing: 0.2em; text-align: center; font-weight: 400; margin: 0 auto 14px; }
.gen-row { display:flex; justify-content:center; align-items:center; gap:12px; margin: 14px 0 10px; flex-wrap:wrap; }
.meta-btn { padding: 10px 20px; border: 0.2em solid #555; border-radius: 10px; background: transparent; color: #555; font-family: 'Saira', sans-serif; font-size: 0.85em; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
.meta-btn.on { border-color: #f7bb2b; color: #f7bb2b; background: rgba(247,187,43,0.08); }
.meta-disc { text-align:center; font-size:0.6em; color:#f7bb2b; letter-spacing:0.12em; margin:-8px 0 2px; display:none; }
.meta-disc.show { display:block; }
.gen-btn { padding: 10px 30px; border: 0.2em solid #fff; border-radius: 10px; background: transparent; color: #fff; font-family: 'Saira', sans-serif; font-size: 1.05em; letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
.gen-btn:hover:not(:disabled) { background: #fff; color: #000; }
.gen-btn:disabled { opacity: 0.3; cursor: default; }
.gen-btn.cd { opacity: 0.5; border-color: #f7bb2b; color: #f7bb2b; animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 0.8; } }

/* ── Columns ───────────────────────────────────────────────── */
#cols { display: flex; gap: 14px; justify-content: center; }
.col { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; gap: 6px; background: #080808; border: 0.08em solid #1a1a1a; border-radius: 10px; padding: 10px; }
.col-label { font-size: 0.55em; letter-spacing: 0.25em; color: #fff; text-transform: uppercase; text-align: center; margin-bottom: 2px; }
.cclass-row { display: flex; gap: 6px; justify-content: center; margin-bottom: 6px; flex-wrap: wrap; }
.cclass-btn { padding: 3px 12px; border: 0.15em solid #555; border-radius: 8px; background: transparent; color: #777; font-family: 'Saira', sans-serif; font-size: 0.65em; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: 0.15s; }
.cclass-btn:hover { border-color: #fff; color: #fff; }
.cclass-btn.on { background: #fff; color: #000; border-color: #fff; }

.crow { display: flex; gap: 8px; justify-content: center; width: 100%; }

/* ── Cards (compact) ────────────────────────────────────────── */
.card { width: 135px; border: 0.12em solid #333; border-radius: 8px; overflow: hidden; background: #0a0a0a; transition: 0.2s; cursor: pointer; min-height: 175px; }
.card:hover { transform: translateY(-3px); }
.card .img { width: 100%; height: 95px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: linear-gradient(180deg, #9EB1C0, #CCDADE); }
.card .img img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
.card .img .f { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 1.8em; color: #fff; }
.card .ft { padding: 4px 6px; text-align: center; min-height: 32px; display: flex; flex-direction: column; justify-content: center; border-top: 0.05em solid #222; }
.card .ft .t { font-size: 0.5em; letter-spacing: 0.12em; color: #fff; text-transform: uppercase; }
.card .ft .n { font-size: 0.7em; font-weight: 600; color: #fff; margin-top: 1px; line-height: 1.15; }
.card.spin .img .f, .card.spin .ft .n { color: #f7bb2b; }
.card.spin { border-color: #f7bb2b !important; box-shadow: 0 0 10px rgba(247,187,43,0.25); }
.card.done { border-color: #fff !important; }
.card.ph { border-color: #222 !important; border-style: dashed; }
.card.ph:hover { border-color: #444 !important; transform: none; }
.card.lk { border-color: #f7bb2b !important; }
.s-card { border-color: #f7bb2b; }
.w-card { border-color: #4a9eff; }
.g-card { border-color: #4ae6a0; }

/* ── Headshot badge ─────────────────────────────────────────── */
.hsb { background: linear-gradient(90deg,transparent,rgba(247,187,43,0.12),transparent); text-align:center; padding:2px 0; font-size:0.52em; letter-spacing:0.1em; color:#f7bb2b; border-bottom:0.05em solid rgba(247,187,43,0.2); }
.hsb-icon { font-size:1.1em; margin-right:1px; }

/* ── Gadget type badge ──────────────────────────────────────── */
.gt { font-size: 0.5em; letter-spacing: 0.08em; text-transform: uppercase; text-align: center; padding: 2px 0; border-top: 0.05em solid #222; }
.gt .b { display: inline-block; padding: 0 5px; border-radius: 2px; }
.gt .explosive { background: rgba(255,80,50,0.2); color: #ff5032; }
.gt .utility { background: rgba(80,160,255,0.2); color: #50a0ff; }
.gt .support { background: rgba(0,212,212,0.2); color: #00d4d4; }
.gt .defensive { background: rgba(200,130,255,0.2); color: #c882ff; }
.gt .fire { background: rgba(255,140,0,0.2); color: #ff8c00; }
.gt .gas { background: rgba(50,220,100,0.2); color: #32dc64; }

/* ── Range badge ─────────────────────────────────────────── */
.rg { font-size: 0.62em; letter-spacing: 0.08em; text-transform: uppercase; text-align: center; padding: 2px 0; color: #fff; border-top: 0.05em solid #222; }

/* ── Column synergy / ix ────────────────────────────────────── */
.csyn { width: 100%; min-height: 10px; margin-top: 2px; }
.csyn-hdr { font-size: 0.6em; color: #f7bb2b; letter-spacing: 0.08em; margin: 2px 0 1px; text-transform: uppercase; }
.csyn-ln { font-size: 0.68em; color: #fff; margin: 0; line-height: 1.4; }
.cix { display: flex; flex-wrap: wrap; gap: 3px; width: 100%; min-height: 10px; margin-top: 1px; }
.cix-b { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 0.55em; letter-spacing: 0.04em; }
.cix-anti { background: rgba(255,80,50,0.12); color: #ff5032; border: 0.05em solid rgba(255,80,50,0.2); }
.goo-tip { width:100%; min-height:4px; margin-top:1px; }
.tip-b { font-size:0.65em; color:#aaa; line-height:1.4; padding:1px 0; }

/* ── Team synergy narrative ────────────────────────────────── */
#team-summary { margin: 10px 0 4px; padding: 10px 16px; background: #0a0a0a; border: 0.08em solid #1a1a1a; border-radius: 8px; font-size: 0.78em; color: #fff; line-height: 1.6; letter-spacing: 0.04em; }
#team-summary.hide { display: none; }
#team-summary .ts-strat { color: #f7bb2b; font-weight: 600; }
#team-summary .ts-items { color: #4a9eff; }

/* ── Slot overlay (reused from singles) ─────────────────────── */
#slot-overlay { position:fixed; inset:0; z-index:1000; display:flex; align-items:center; justify-content:center; }
#slot-overlay.hide { display:none; }
.so-backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.85); }
.so-panel { position:relative; background:#0a0a0a; border:0.15em solid #fff; border-radius:10px; padding:16px; max-width:480px; width:90%; max-height:80vh; overflow-y:auto; -webkit-overflow-scrolling:touch; touch-action:manipulation; }
.so-header { font-size:0.65em; letter-spacing:0.2em; color:#f7bb2b; text-transform:uppercase; text-align:center; margin-bottom:6px; }
.so-random { display:block; margin:0 auto 8px; padding:3px 14px; border:0.15em solid #fff; border-radius:8px; background:transparent; color:#fff; font-family:'Saira',sans-serif; font-size:0.6em; letter-spacing:0.1em; cursor:pointer; transition:0.15s; }
.so-random:hover { background:#fff; color:#000; }
.so-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; }
.so-item { display:flex; flex-direction:column; align-items:center; gap:2px; padding:4px 2px; border:0.1em solid #333; border-radius:6px; background:transparent; color:#fff; font-family:'Saira',sans-serif; font-size:0.55em; cursor:pointer; transition:0.15s; line-height:1.2; touch-action:manipulation; }
@media (hover:hover){ .so-item:hover { border-color:#fff; color:#fff; } }
.so-item.locked { border-color:#f7bb2b; color:#f7bb2b; background:rgba(247,187,43,0.08); }
.so-item img { width:100%; height:auto; max-height:40px; object-fit:contain; }

hr { border: 0; border-top: 0.08em solid #222; margin: 16px 0 12px; }
#ftr { text-align: center; color: #555; font-size: 0.72em; padding: 8px 0 20px; letter-spacing: 0.1em; }
</style>
</head>

function wikiURL(item) {
  let w = W[item];
  if (!w) return null;
  return 'https://www.thefinals.wiki/w/images/thumb/'+w[0]+'/'+w[0]+w[1]+'/'+w+'/100px-'+w+'.webp';
}
function fallbackImg(el) {
  if (el.dataset.raw) { el.src=el.dataset.raw; el.dataset.raw=''; }
  else if (el.dataset.wiki) { el.src=el.dataset.wiki; el.dataset.wiki=''; }
  else { el.parentElement.innerHTML='<div class="f">'+el.dataset.first+'</div>'; }
}
function imgTag(item) {
  let slug=item.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  return '<img src="imgs/equipment-thumbnails/'+slug+'.png" alt="'+item+'" loading="lazy" data-raw="imgs/equipment-thumbnails/'+item+'.png" data-wiki="'+(wikiURL(item)||'')+'" data-first="'+item[0]+'" onerror="fallbackImg(this)">';
}

// ── Helpers ───────────────────────────────────────────────────────────
function ra(a){return a[Math.floor(Math.random()*a.length)];}
function rn(n,a){let p=[...a],r=[];while(r.length<n&&p.length){let i=Math.floor(Math.random()*p.length);r.push(p.splice(i,1)[0]);}return r;}
function pickWithMeta(pool, slotKey, classKey){
  let ck = classKey || cc;
  if(!metaOn||!META[ck]||!META[ck][slotKey]) return ra(pool);
  let tiers=META[ck][slotKey];
  if(tiers.S&&tiers.S.length&&Math.random()<0.6){
    let sPool=pool.filter(x=>tiers.S.includes(x));
    if(sPool.length) return ra(sPool);
  }
  let saPool=pool.filter(x=>[...(tiers.S||[]),...(tiers.A||[])].includes(x));
  if(saPool.length) return ra(saPool);
  return ra(pool);
}
function hsBadge(name){
  let w=WS[name];
  if(!w||!w.hs) return '';
  return '<div class="hsb"><span class="hsb-icon">&#9760;</span> '+Math.round(w.hs*100)+'%</div>';
}
function gtypeHTML(n){
  let g=GS[n];
  if(!g) return '';
  return '<div class="gt"><span class="b '+g.t+'">'+g.t+'</span></div>';
}
function rangeBadge(name){
  let w=WS[name];
  if(!w||!w.r) return '';
  return '<div class="rg">Range: '+w.r+'</div>';
}

}

  el.querySelector('.img').innerHTML=imgTag(name);

    let h='<div class="rg">Range: '+WS[name].r+'</div>';
    if(rg) rg.outerHTML=h;
    else el.querySelector('.ft').insertAdjacentHTML('afterend',h);
  }else if(rg) rg.remove();
}

// ── Generate single column ───────────────────────────────────────────
function spinCol(ci, c, lk, doneCB){
  let specNames=c.spec.map(x=>x.n);
  let wepNames=c.wep;
  let gadPool=[...c.gad,...DATA.shared.gad];

  let ck=cols[ci].cc;
  let specFinal=lk.spec||pickWithMeta(specNames,'spec',ck);
  let wepFinal=lk.wep||pickWithMeta(wepNames,'wep',ck);
  let gadgets=[null,null,null];
  let used=[];
  SLOT_KEYS.slice(2).forEach((key,i)=>{ if(lk[key]){ gadgets[i]=lk[key]; used.push(lk[key]); } });
  SLOT_KEYS.slice(2).forEach((key,i)=>{
    if(gadgets[i]===null){
      let pool=gadPool.filter(g=>!used.includes(g));
      if(!pool.length) pool=gadPool;
      let pick=pickWithMeta(pool,'gad',ck);
      gadgets[i]=pick; used.push(pick);
    }
  });

  let allItems=[specFinal,wepFinal,...gadgets];
  let colEl=document.querySelector('.col[data-col="'+ci+'"]');
  let cards=colEl.querySelectorAll('.card');
  cards.forEach((el,i)=>{
    el.outerHTML=teamCardHTML(SLOT_LABELS[i], allItems[i], ['s-card','w-card','g-card','g-card','g-card'][i], i>=2, SLOT_KEYS[i]);
  });
  cards=colEl.querySelectorAll('.card');
  cards.forEach(el=>el.classList.add('spin'));

  let allLocked=Object.values(lk).every(v=>v!==null);
  let defs=SLOT_KEYS.map((key,i)=>({
    el:cards[i],
    pool:allLocked?[allItems[i]]:(i===0?specNames:i===1?wepNames:gadPool),
    final:allItems[i], iv:null, g:i>=2
  }));

  defs.forEach(d=>{ if(d.pool.length>1) d.iv=setInterval(()=>setTeamCard(d.el,ra(d.pool),d.g),55); });

  function stop(idx,at){
    setTimeout(()=>{
      let d=defs[idx];
      if(d.iv){clearInterval(d.iv);d.iv=null;}
      setTeamCard(d.el,d.final,d.g);
      d.el.classList.add('done');
    },at);
  }
  if(allLocked){ stop(4,0);stop(3,0);stop(2,0);stop(1,0);stop(0,0); }
  else { stop(4,300);stop(3,450);stop(2,600);stop(1,800);stop(0,1000); }

  let revealDelay=allLocked?30:1050;
  // Show within-column synergy
  setTimeout(()=>{
    let seen=new Set();
    let synLines=[];
    SY.forEach(p=>{
      if(allItems.includes(p.a)&&allItems.includes(p.b)){
        let key=p.a<p.b?p.a+'||'+p.b:p.b+'||'+p.a;
        if(!seen.has(key)){ seen.add(key); synLines.push('<div class="csyn-ln">&bull; '+p.a+' + '+p.b+(p.d?' \u2014 '+p.d:'')+'</div>'); }
      }
    });
    let synEl=colEl.querySelector('.csyn');
    if(synEl){ synEl.innerHTML=synLines.length?'<div class="csyn-hdr">Synergy</div>'+synLines.join(''):''; }
  },revealDelay);

  // Anti-synergy
  setTimeout(()=>{
    let r=checkIX(allItems);
    let ixEl=colEl.querySelector('.cix');
    if(ixEl){
      let h='';
      r.forEach(d=>{h+='<span class="cix-b cix-anti">&#9888; '+d+'</span>';});
      ixEl.innerHTML=h;
    }
    // Goo Gun tip
    let tipEl=colEl.querySelector('.goo-tip');
    if(tipEl){
      tipEl.innerHTML=allItems.includes('Goo Gun')?'<div class="tip-b">Tip: Goo Gun can disable enemy gadgets such as mines and turrets</div>':'';
    }
  },revealDelay+30);

  setTimeout(()=>{
    defs.forEach(d=>{if(d.iv){clearInterval(d.iv);d.iv=null;}});
    doneCB(allItems);
  },revealDelay+80);
}

// ── Generate all ──────────────────────────────────────────────────────
function genAll(){
  if(!document.querySelector('.cclass-btn.on')||spinning) return;
  spinning=true;
  if(cdTimer){clearInterval(cdTimer);cdTimer=null;}
  let btn=document.getElementById('gb');
  btn.disabled=true; btn.classList.remove('cd'); btn.textContent='GENERATE ALL';

  let results=[null,null,null];
  let pending=3;
  let startTime=Date.now();

  for(let ci=0;ci<3;ci++){
    if(!cols[ci].cc){ pending--; continue; }
    spinCol(ci, DATA[cols[ci].cc], {...cols[ci].locked}, (items)=>{
      results[ci]=items;
      pending--;
      if(pending===0) finalize(results);
    });
  }
  if(pending===0) setTimeout(()=>finalize(results),50);

  function finalize(allResults){
    // Build active cross-column strategies
    let allItems=[];
    allResults.forEach((items,ci)=>{ if(items) items.forEach(item=>{ allItems.push({item,col:ci}); }); });
    let seen=new Set();
    let active=new Map(); // strategy -> [{pair, items, cols, desc}]
    SY.forEach(p=>{
      let ai=allItems.filter(x=>x.item===p.a);
      let bi=allItems.filter(x=>x.item===p.b);
      ai.forEach(a=>{
        bi.forEach(b=>{
          if(a.col!==b.col){
            let key=a.col<b.col?p.a+'|'+p.b+'|'+a.col+'|'+b.col:p.b+'|'+p.a+'|'+b.col+'|'+a.col;
            let sk=p.a<p.b?p.a+'||'+p.b:p.b+'||'+p.a;
            let syn=CS[sk];
            if(syn&&!seen.has(key)){
              seen.add(key);
              if(!active.has(syn.strategy)) active.set(syn.strategy,[]);
              active.get(syn.strategy).push({pair:sk,items:[p.a,p.b],cols:[a.col,b.col],desc:syn.d});
            }
          }
        });
      });
    });
    // Build strategy pairs
    let ts=document.getElementById('team-summary');
    let stratParts=[];
    active.forEach((entries,strategy)=>{
      let first=entries[0];
      stratParts.push('<span class="ts-strat">'+strategy+'</span> (<span class="ts-items">'+first.items[0]+' + '+first.items[1]+'</span> \u2014 '+first.desc+')');
    });

    // Build team profile (role-based detection)
    let roleCounts={};
    let roleItems={};
    allItems.forEach(function(e){
      let roles=ROLES[e.item];
      if(roles) roles.forEach(function(r){
        roleCounts[r]=(roleCounts[r]||0)+1;
        if(!roleItems[r]) roleItems[r]=[];
        if(roleItems[r].indexOf(e.item)===-1) roleItems[r].push(e.item);
      });
    });
    let sortedRoles=Object.keys(roleCounts).sort(function(a,b){return roleCounts[b]-roleCounts[a];});
    let activeRoles=sortedRoles.filter(function(r){return roleCounts[r]>=2;}).slice(0,2);
    let profileParts=[];
    if(activeRoles.length){
      activeRoles.forEach(function(r){
        profileParts.push('<span class="ts-strat">'+r+'</span> ('+roleItems[r].join(', ')+')');
      });
    }

    // Compose narrative
    let parts=[];
    if(stratParts.length) parts.push('Strategies: '+stratParts.join('; ')+'.');
    if(profileParts.length) parts.push('Team Profile: Strong '+profileParts.join(' and ')+' \u2014 this squad excels at '+(profileParts.length>1?'team fights with layered capabilities':'sustained '+activeRoles[0].toLowerCase())+'.');

    if(parts.length){
      ts.innerHTML=parts.join('<br>');
      ts.classList.remove('hide');
    }else{
      ts.innerHTML='No cross-loadout strategies detected. Try different class or equipment combinations to discover team playstyles.';
      ts.classList.remove('hide');
    }

    // Start cooldown
    let elapsed=Date.now()-startTime;
    let wait=Math.max(0,5000-elapsed);
    setTimeout(()=>{
      btn.disabled=true; btn.classList.add('cd'); btn.textContent=''+(wait/1000||5);
      let cdn=Math.ceil(wait/1000);
      cdTimer=setInterval(()=>{
        cdn--;
        btn.textContent=''+(cdn<0?0:cdn);
        if(cdn<=0){ clearInterval(cdTimer);cdTimer=null;btn.disabled=false;btn.classList.remove('cd');btn.textContent='GENERATE ALL'; }
      },1000);
    });
    spinning=false;
  }
}

// ── Event handlers ───────────────────────────────────────────────────
document.querySelectorAll('.cclass-btn').forEach(b=>{
  b.onclick=()=>{
    if(spinning) return;
    let ci=parseInt(b.dataset.col);
    let c=b.dataset.c;
    closeSlotOverlay();
    // Reset all locks for this column
    Object.keys(cols[ci].locked).forEach(k=>{ cols[ci].locked[k]=null; });
    cols[ci].cc=c;
    // Update class button visuals
    document.querySelectorAll('.cclass-btn[data-col="'+ci+'"]').forEach(x=>x.classList.toggle('on',x.dataset.c===c));
    // Reset column cards to placeholders
    let colEl=document.querySelector('.col[data-col="'+ci+'"]');
    let cards=colEl.querySelectorAll('.card');
    cards.forEach((el,i)=>{
      el.classList.remove('ph','lk','spin','done');
      el.classList.add('ph');
      el.dataset.slot=SLOT_KEYS[i];
      el.querySelector('.img').innerHTML='<div class="f">?</div>';
      el.querySelector('.ft .n').textContent='-';
      // Clear leftover badges
      let le=el.querySelector('.hsb'); if(le) le.remove();
      le=el.querySelector('.gt'); if(le) le.remove();
      le=el.querySelector('.rg'); if(le) le.remove();
    });
    colEl.querySelector('.csyn').innerHTML='';
    colEl.querySelector('.cix').innerHTML='';
    colEl.querySelector('.goo-tip').innerHTML='';
    // Enable GENERATE if any column has a class
    let anyOn=document.querySelector('.cclass-btn.on');
    document.getElementById('gb').disabled=!anyOn;
  };
});

// Card click — open overlay
document.getElementById('cols').addEventListener('click', function(e){
  let card=e.target.closest('.card');
  if(!card||spinning) return;
  let colEl=card.closest('.col');
  if(!colEl) return;
  let ci=parseInt(colEl.dataset.col);
  let slot=card.dataset.slot;
  if(!cols[ci].cc) return;
  openSlotOverlay(ci, slot);
});

// Overlay click
document.getElementById('slot-overlay').addEventListener('click', function(e){
  if(e.target===this||e.target.classList.contains('so-backdrop')){ closeSlotOverlay(); return; }
  let btn=e.target.closest('[data-ci]');
  if(!btn) return;
  let ci=parseInt(btn.dataset.ci);
  let slot=btn.dataset.slot;
  let item=btn.dataset.item;
  lockSlot(ci, slot, item||null);
  closeSlotOverlay();
  // Update card appearance
  let colEl=document.querySelector('.col[data-col="'+ci+'"]');
  let cards=colEl.querySelectorAll('.card');
  let idx=SLOT_KEYS.indexOf(slot);
  if(cards[idx]&&item){
    cards[idx].classList.remove('ph','spin','done');
    cards[idx].classList.add('lk');
    setTeamCard(cards[idx], item, idx>=2);
  }else if(cards[idx]){
    cards[idx].classList.remove('lk','spin','done');
    cards[idx].classList.add('ph');
    cards[idx].querySelector('.img').innerHTML='<div class="f">?</div>';
    cards[idx].querySelector('.ft .n').textContent='-';
  }
});

document.addEventListener('keydown', function(e){
  if(e.key==='Escape') closeSlotOverlay();
});

document.getElementById('mb').addEventListener('click', function(){
  if(spinning) return;
  metaOn=!metaOn;
  this.classList.toggle('on',metaOn);
  document.getElementById('md').classList.toggle('show',metaOn);
});

document.getElementById('gb').onclick=genAll;
</script>
